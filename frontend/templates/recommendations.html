{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Store - Recommendations</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>

<body>

    <!-- NAVBAR -->
    <div class="navbar">
    <h2>Smart Store</h2>
        <div>
            <a href="/home/">Home</a>
            <a href="/products/">Products</a>
            <a href="/recommendations/">Recommendations</a>
            <a href="/cart/">Cart</a>
            <a href="#" onclick="goToLogin()">Login</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </div>

    <!-- HEADER -->
    <div class="header">
        <h1>Your Personalized Recommendations</h1>
        <p>AI-powered suggestions based on your behavior</p>
    </div>

    <!-- RECOMMENDATIONS CONTAINER -->
    <div class="container" id="recommend-container">
        <!-- سيتم تعبئة التوصيات -->
    </div>

    <footer style="text-align: center; padding: 20px; margin-top: 30px; border-top: 1px solid #eee;">
        <p>Smart Store Project</p>
    </footer>

    <script>
        // جلب user_id من LocalStorage
        const userId = localStorage.getItem("user_id");

        // إذا لم يسجل المستخدم دخول → نعيده للصفحة الرئيسية
        if (!userId) {
            alert("Please login first.");
            window.location.href = "/";
        }

        // جلب التوصيات من Django API
        fetch(`/api/recommend/${userId}/`)
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById("recommend-container");

                if (data.length === 0) {
                    container.innerHTML = "<h2>No recommendations available yet.</h2>";
                    return;
                }

                data.forEach(item => {
                    container.innerHTML += `
                        <div class="card">
                            <img src="https://via.placeholder.com/300" alt="${item.category}">
                            <h3>Product #${item.product_id}</h3>
                            <p>Category: ${item.category}</p>
                            <p>Price: $${item.price}</p>

                            <button onclick="addToCart(${item.product_id}, '${item.category}', ${item.price})">
                                Add to Cart
                            </button>
                        </div>
                    `;
                });
            });

        // إضافة للسلة + تسجيل السلوك
        function addToCart(id, category, price) {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];

            cart.push({
                product_id: id,
                category: category,
                price: price
            });

            localStorage.setItem("cart", JSON.stringify(cart));

            alert("Product added to cart!");

            fetch("/api/behavior/", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    user_id: userId,
                    product_id: id,
                    action: "clicked"
                })
            });
        }
    </script>

    <script>
        function logout() {
            localStorage.removeItem("user_id");
            alert("You have been logged out.");
            window.location.href = "/";
        }
    </script>

    <script>
    function logout() {
        const userId = localStorage.getItem("user_id");

        if (!userId) {
            alert("You are already logged out.");
            return;
        }

        localStorage.removeItem("user_id");
        alert("You have been logged out.");
        window.location.href = "/";
    }

    function goToLogin() {
        const userId = localStorage.getItem("user_id");

        if (userId) {
            alert("You are already logged in.");
            return;
        }

        window.location.href = "/";
    }
    </script>



</body>

</html>
