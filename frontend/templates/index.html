{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Store - Login</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>

<body class="login-body">

    <div class="login-container">
        <form class="login-form" id="loginForm">
            <h2>Welcome!</h2>
            <p>Enter your User ID to continue</p>

            <div class="input-group">
                <label>User ID</label>
                <input type="number" id="user_id" placeholder="Enter your user ID" required>
            </div>

            <button type="submit" class="login-btn">Login</button>

            <div class="login-footer">
                <a href="/home/" class="back-home">Back to Store</a>
            </div>
        </form>
    </div>

    <script>
        document.getElementById("loginForm").addEventListener("submit", function (e) {
            e.preventDefault();

            const userId = parseInt(document.getElementById("user_id").value);

            fetch("/api/users/")
                .then(res => res.json())
                .then(users => {
                    const user = users.find(u => u.user_id === userId);

                    if (!user) {
                        alert("User ID not found");
                        return;
                    }

                    // حفظ user_id
                    localStorage.setItem("user_id", user.user_id);

                    // تسجيل السلوك
                    fetch("/api/behavior/", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            user_id: user.user_id,
                            product_id: null,
                            action: "login"
                        })
                    });

                    alert("Welcome User #" + user.user_id);

                    window.location.href = "/home/";
                });
        });
    </script>

</body>

</html>
